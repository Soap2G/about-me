server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: every unknown path returns index.html so react-router
    # can resolve /essay/<slug> client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed bundle assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Markdown essays are content; let the browser revalidate.
    location /essays/ {
        add_header Cache-Control "no-cache";
    }

    # Friendly defaults
    error_page 404 /index.html;

    # Don't expose nginx version
    server_tokens off;
}
